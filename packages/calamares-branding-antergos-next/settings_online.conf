---
modules-search: [ /usr/lib/calamares/modules, /etc/calamares/modules ]

sequence:
    - show:
        - welcome
        - locale
        - keyboard
        - packagechooser
        - netinstall
        - partition
        - users
        - summary
    - exec:
        - partition
        - mount
        - basestrap
        - machineid
        - packages
        - fstab
        - locale
        - keyboard
        - localecfg
        - luksopenswaphookcfg
        - luksbootkeyfile
        - initcpiocfg
        - initcpio
        - users
        - displaymanager
        - networkcfg
        - hwclock
        - services-artix
        - grubcfg
        - bootloader
        - postcfg
        - umount
    - show:
        - finished

branding: antergos-next

prompt-install: false

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

hide-back-and-next-during-exec: false

quit-at-end: false
